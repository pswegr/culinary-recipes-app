<ng-container *ngIf="recipes$ | async as recipes; else recipesLoading">
  <div class="r-container" [largeScreens]="['r-desktop']" [smallScreens]="['r-handset-poitret-mode']" appResponsiveness>
    <div class="r-header" appResponsiveness [largeScreens]="['r-desktop']" [smallScreens]="['r-handset-poitret-mode']">
      <h2 class="r-title">{{title}}
        @if(this.category){
          {{' - ' + this.category}}
        }
      </h2>
      <div class="r-header__top">
        <div class="r-search-bar-container" cdkOverlayOrigin #overlayPosition="cdkOverlayOrigin"
          [ngClass]="{'opened mat-elevation-z2': overlayOpen()}">
          <div class="r-search-bar-container__left">
            <button mat-icon-button (click)="handleSearch()">
              <mat-icon>search</mat-icon>
            </button>
            <input class="r-input" placeholder="Search recipes" (click)="overlayOpen.set(true)" appResponsiveness
              [darkMode]="['r-dark-mode']" [formControl]="searchText" />
          </div>
          <button mat-icon-button (click)="resetSearchText()" class="r-clear-filter">
            <mat-icon>close</mat-icon>
          </button>
        </div>
        @if (overlayOpen()) {
          <div class="r-search-backdrop" (click)="overlayOpen.set(false)" aria-hidden="true"></div>
        }
        <ng-template #connectedOverlay="cdkConnectedOverlay" cdkConnectedOverlay
          [cdkConnectedOverlayOpen]="overlayOpen()" [cdkConnectedOverlayOrigin]="overlayPosition"
          [cdkConnectedOverlayHasBackdrop]="overlayOptions.hasBackdrop" (overlayOutsideClick)="overlayOpen.set(false)"
          [cdkConnectedOverlayFlexibleDimensions]="overlayOptions.flexibleDimensions">
          <app-search-overlay [recentSearches]="recentSearches()" [filteredRecipesList]="filteredRecipesList()!" 
            (onHistoryItemChoosen)="searchText.setValue($event)"></app-search-overlay>
        </ng-template>
        <button class="r-add-button recipe-mat-primary-button" mat-fab routerLink="/recipes/upsert"
          matTooltip="Add new recipe">
          <mat-icon>add</mat-icon>
        </button>
      </div>
      <div class="r-chips">
        <mat-chip-listbox multiple aria-label="Tag selection" (change)="chipsChanged($event)">
          <mat-chip-option [selected]="selected(tag)" [disabled]="disableCombination(recipes, tag)" title="tag"
            *ngFor="let tag of tags$ | async">{{tag}}</mat-chip-option>
        </mat-chip-listbox>
      </div>
    </div>
    <div class="r-content" appResponsiveness [largeScreens]="['r-desktop']" [smallScreens]="['r-handset-poitret-mode']">
      <app-recipes-list-item [recipe]="item" *ngFor="let item of recipes" (tag)="clickTagOnItem($event)"
        (likeToggleClicked)="clickLikeToggle($event)"
        (messageAuthorClicked)="openMessaging($event.recipientUserId, $event.recipientLabel)"></app-recipes-list-item>
    </div>
  </div>
</ng-container>
<ng-template #recipesLoading>
  <div class="r-container r-skeleton-container" [largeScreens]="['r-desktop']" [smallScreens]="['r-handset-poitret-mode']" appResponsiveness>
    <div class="r-header" appResponsiveness [largeScreens]="['r-desktop']" [smallScreens]="['r-handset-poitret-mode']">
      <div class="r-title r-skeleton r-skeleton-title"></div>
      <div class="r-header__top">
        <div class="r-search-bar-container r-skeleton-bar">
          <div class="r-skeleton r-skeleton-line"></div>
        </div>
        <div class="r-skeleton r-skeleton-fab"></div>
      </div>
      <div class="r-chips r-skeleton-chips">
        <span class="r-skeleton r-skeleton-pill" *ngFor="let _ of skeletonChips"></span>
      </div>
    </div>
    <div class="r-content" appResponsiveness [largeScreens]="['r-desktop']" [smallScreens]="['r-handset-poitret-mode']">
      <div class="r-skeleton-card" *ngFor="let _ of skeletonCards">
        <div class="r-skeleton r-skeleton-media"></div>
        <div class="r-skeleton r-skeleton-line"></div>
        <div class="r-skeleton r-skeleton-line short"></div>
      </div>
    </div>
  </div>
</ng-template>
