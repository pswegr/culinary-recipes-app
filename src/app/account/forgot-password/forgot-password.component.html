<div class="forgot-password-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="fill">
      <mat-label>{{ 'common.email' | t }}</mat-label>
      <input matInput formControlName="email" type="email" />
      <mat-error *ngIf="loginForm.controls['email'].hasError('required')">
        {{ 'account.errors.emailRequired' | t }}
      </mat-error>
      <mat-error *ngIf="loginForm.controls['email'].hasError('email')">
        {{ 'account.errors.emailInvalid' | t }}
      </mat-error>
    </mat-form-field>
    <button class="r-login__button" mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid">
      {{ 'account.forgotPassword.sendLink' | t }}
    </button>
  </form>
  <div class="r-register">
    <div class="r-register__info">
      {{ 'account.forgotPassword.noAccount' | t }}
    </div>
    <button class="r-register__button" mat-raised-button color="primary" routerLink="/account/register">
      {{ 'account.forgotPassword.register' | t }}
    </button>
  </div>
  <div class="r-login">
    <button class="r-login__button" mat-button color="primary" routerLink="/account/login">
      {{ 'account.forgotPassword.goToLogin' | t }}
    </button>
  </div>
</div>
